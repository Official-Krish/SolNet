apiVersion: apps/v1
kind: Deployment
metadata:
  name: axion-frontend
  namespace: axion
  labels:
    app: axion-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axion-frontend
  template:
    metadata:
      labels:
        app: axion-frontend
    spec:
      containers:
        - name: axion-frontend
          image: krishanand01/axion-frontend:v2.2
          ports:
            - containerPort: 5173
          volumeMounts:
            - name: env-file
              mountPath: /app/.env
              subPath: env
      volumes:
        - name: env-file
          secret:
            secretName: axion-frontend-env
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axion-backend
  namespace: axion
  labels:
    app: axion-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axion-backend
  template:
    metadata:
      labels:
        app: axion-backend
    spec:
      containers:
        - name: axion-backend
          image: krishanand01/axion-backend:v2.1
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: env-file
              mountPath: /app/apps/backend/.env
              subPath: env
            - name: gcp-key-volume
              mountPath: /app/apps/backend/vm-manager.json
              subPath: vm-manager.json
              readOnly: true
      volumes:
        - name: env-file
          secret:
            secretName: axion-backend-env
        - name: gcp-key-volume
          secret:
            secretName: gcp-key-secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axion-worker
  namespace: axion
  labels:
    app: axion-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axion-worker
  template:
    metadata:
      labels:
        app: axion-worker
    spec:
      containers:
        - name: axion-worker
          image: krishanand01/axion-worker:v2.1
          volumeMounts:
            - name: env-file
              mountPath: /app/apps/worker/.env
              subPath: env
            - name: gcp-key-volume
              mountPath: /app/apps/worker/vm-manager.json
              subPath: vm-manager.json
      volumes:
        - name: env-file
          secret:
            secretName: axion-worker-env
        - name: gcp-key-volume
          secret:
            secretName: gcp-key-secret
---
