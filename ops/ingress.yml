apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-nginx
  namespace: axion
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"  
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"  
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"   
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP" 
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.axion.krishlabs.tech
      secretName: axion-backend-tls
    - hosts:
        - wss.axion.krishlabs.tech
      secretName: axion-ws-relayer-tls
    - hosts:
        - wss.depin.axion.krishlabs.tech
      secretName: axion-depin-ws-relayer-tls

  rules:
    - host: axion.krishlabs.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axion-frontend
                port:
                  number: 80

    - host: api.axion.krishlabs.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axion-backend
                port:
                  number: 80
    - host: wss.axion.krishlabs.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axion-ws-relayer
                port:
                  number: 80

    - host: wss.depin.axion.krishlabs.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axion-depin-ws-relayer
                port:
                  number: 80
---